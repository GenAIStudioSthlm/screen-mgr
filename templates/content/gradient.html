<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient — screen {{ screen_id }} ({{ zone_name or 'unmapped' }})</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060606; }
    #stage { position: fixed; inset: 0; overflow: hidden; background: #060606;
             transition: background 1.2s ease; }
    /* Base wash — a soft linear blend of the zone's light colours. */
    #wash { position: absolute; inset: 0; opacity: 0.9; transition: background 1.2s ease; }
    /* Blurred colour blobs, one per light, drifting slowly. */
    .blob { position: absolute; width: 70%; height: 70%; border-radius: 50%;
            filter: blur(70px); mix-blend-mode: screen; opacity: 0.85;
            will-change: transform; transition: background 1.2s ease; }
    /* 4% film grain — matches the prototype's noise overlay. */
    #noise { position: absolute; inset: 0; opacity: 0.04; pointer-events: none; z-index: 5;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px; }
    #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.12); pointer-events: none; z-index: 4; }
    @keyframes drift0 { 0%{transform:translate(-12%,-10%) scale(1)} 50%{transform:translate(8%,6%) scale(1.18)} 100%{transform:translate(-12%,-10%) scale(1)} }
    @keyframes drift1 { 0%{transform:translate(40%,-8%) scale(1.1)} 50%{transform:translate(28%,18%) scale(0.95)} 100%{transform:translate(40%,-8%) scale(1.1)} }
    @keyframes drift2 { 0%{transform:translate(10%,40%) scale(1.05)} 50%{transform:translate(-6%,26%) scale(1.2)} 100%{transform:translate(10%,40%) scale(1.05)} }
    @keyframes drift3 { 0%{transform:translate(44%,42%) scale(1)} 50%{transform:translate(30%,30%) scale(1.15)} 100%{transform:translate(44%,42%) scale(1)} }
    /* Shown when the zone has no lit lights — gentle idle pulse. */
    #idle { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
            color:rgba(255,255,255,0.18); font:600 14px/1.4 'Graphik',Arial,sans-serif;
            letter-spacing:0.12em; text-transform:uppercase; z-index:6; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="wash"></div>
    <div id="blobs"></div>
    <div id="overlay"></div>
    <div id="noise"></div>
    <div id="idle">No lighting</div>
  </div>

  <script>
    const SCREEN_ID = {{ screen_id }};
    const POLL_MS = 3000;
    let current = "";

    function render(colors) {
      const key = (colors || []).join(",");
      if (key === current) return;        // no change — avoid reflow
      current = key;

      const stage = document.getElementById("stage");
      const wash = document.getElementById("wash");
      const blobs = document.getElementById("blobs");
      const idle = document.getElementById("idle");

      if (!colors || colors.length === 0) {
        wash.style.background = "transparent";
        blobs.innerHTML = "";
        stage.style.background = "#060606";
        idle.style.display = "flex";
        return;
      }
      idle.style.display = "none";

      // Base wash: a linear blend; single colour -> solid-ish.
      const stops = colors.length === 1 ? [colors[0], colors[0]] : colors;
      wash.style.background = "linear-gradient(135deg, " + stops.join(", ") + ")";
      stage.style.background = colors[0];

      // One drifting blob per colour (cap at 4).
      blobs.innerHTML = "";
      const pos = [
        { left: "-10%", top: "-10%" },
        { left: "45%",  top: "-12%" },
        { left: "-5%",  top: "45%"  },
        { left: "48%",  top: "46%"  },
      ];
      colors.slice(0, 4).forEach((c, i) => {
        const b = document.createElement("div");
        b.className = "blob";
        b.style.background = "radial-gradient(circle at 50% 50%, " + c + " 0%, transparent 70%)";
        b.style.left = pos[i].left;
        b.style.top = pos[i].top;
        b.style.animation = "drift" + i + " " + (16 + i * 5) + "s ease-in-out infinite";
        blobs.appendChild(b);
      });
    }

    async function poll() {
      try {
        const r = await fetch("/api/studio/screen/" + SCREEN_ID + "/gradient", { cache: "no-store" });
        if (r.ok) { const d = await r.json(); render(d.colors || []); }
      } catch (e) { /* keep last frame on transient errors */ }
    }

    // Initial paint from server-rendered colours, then track lights live.
    render({{ colors | tojson }});
    setInterval(poll, POLL_MS);
  </script>
</body>
</html>
