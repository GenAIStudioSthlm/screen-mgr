{# views/audio.html — Audio system view. audio.js loads from index.html's
   <head>; no <script> tag here. #}

<div x-data="v2AudioView()" x-init="load()"
     style="display:flex;flex-direction:column;gap:var(--s-4)">

  {# ---------- Header ---------- #}
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s-3);flex-wrap:wrap">
    <div>
      <h1 style="margin:0">Audio</h1>
      <p style="margin:var(--s-1) 0 0;color:var(--text-dim);font-size:12px">
        System mixer, microphones, sound playback.
      </p>
    </div>
    <div>
      <span class="pill pill-err">stub</span>
    </div>
  </div>

  {# ---------- Backend status card ---------- #}
  <div class="card" style="border-color:var(--err)">
    <h3 style="margin:0 0 var(--s-2);color:var(--err)">Backend not wired</h3>
    <p style="margin:0;color:var(--text-mid);font-size:12px">
      The Audio MCP server (<code>/mcp/audio/sse</code>) is mounted and the HTTP
      endpoints under <code>/api/audio/*</code> exist, but every tool currently
      returns <code>{"stub": true}</code>. To make this view real, wire each
      tool to PulseAudio's <code>pactl</code> (or ALSA's <code>amixer</code>/
      <code>aplay</code>) in <code>mcps/audio/server.py</code> and
      <code>routes/audio_routes.py</code>. Tool signatures are stable —
      no UI changes needed once the backend lands.
    </p>
  </div>

  {# ---------- Surface the stubs so we know wiring works ---------- #}
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-2)">
      <h3 style="margin:0">Probe responses</h3>
      <button @click="load()" class="btn btn-ghost" style="font-size:11px">↻ Refresh</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr;gap:var(--s-3)">

      <div>
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em">GET /api/audio/sinks</div>
        <pre style="margin:var(--s-1) 0 0;font-size:10px;background:var(--bg);padding:var(--s-2);overflow-x:auto" x-text="JSON.stringify(sinks, null, 2)"></pre>
      </div>

      <div>
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em">GET /api/audio/sources</div>
        <pre style="margin:var(--s-1) 0 0;font-size:10px;background:var(--bg);padding:var(--s-2);overflow-x:auto" x-text="JSON.stringify(sources, null, 2)"></pre>
      </div>

    </div>
  </div>

  {# ---------- Tool surface (informational) ---------- #}
  <div class="card">
    <h3 style="margin:0 0 var(--s-2)">Planned controls</h3>
    <ul style="margin:0;padding-left:18px;color:var(--text-mid);font-size:12px;line-height:1.7">
      <li>Per-sink volume slider + mute toggle (one row per output device)</li>
      <li>Per-source mute toggle (one row per microphone)</li>
      <li>Play a sound file — pick from a small library bundled with screen-mgr</li>
      <li>"Test tone" button — sweep / 1 kHz / pink noise to verify speakers</li>
    </ul>
  </div>

</div>
