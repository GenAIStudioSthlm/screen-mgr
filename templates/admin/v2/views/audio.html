{# views/audio.html — Audio system view. audio.js loads from index.html's
   <head>; no <script> tag here. #}

<div x-data="v2AudioView()" x-init="load()"
     style="display:flex;flex-direction:column;gap:var(--s-4)">

  {# ---------- Header ---------- #}
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s-3);flex-wrap:wrap">
    <div>
      <h1 style="margin:0">Audio</h1>
      <p style="margin:var(--s-1) 0 0;color:var(--text-dim);font-size:12px">
        System sinks/sources via PulseAudio · networked mics via mDNS+SSC · multicast streams via SAP.
      </p>
    </div>
    <div style="display:flex;gap:var(--s-1)">
      <span class="pill pill-ok">all real</span>
    </div>
  </div>

  {# ---------- System sinks (real, PulseAudio via pactl) ---------- #}
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-2)">
      <h3 style="margin:0;font-size:13px">System audio sinks (outputs)</h3>
      <button @click="loadSinks()" :disabled="sinksLoading" class="btn btn-ghost" style="font-size:11px">
        <span x-show="!sinksLoading">↻ Refresh</span>
        <span x-show="sinksLoading">⏳</span>
      </button>
    </div>
    <p style="margin:0 0 var(--s-2);font-size:11px;color:var(--text-dim)">
      <span x-show="defaultSink">Default: <code x-text="defaultSink"></code></span>
      <span x-show="!defaultSink">no default sink</span>
    </p>
    <template x-if="sinks && sinks.error">
      <div style="color:var(--err);font-size:11px;font-family:var(--font-mono)" x-text="sinks.error"></div>
    </template>
    <div style="display:flex;flex-direction:column;gap:var(--s-1)">
      <template x-for="s in (sinks?.sinks || [])" :key="s.index">
        <div style="display:flex;align-items:center;gap:var(--s-2);padding:var(--s-2) 0;border-bottom:1px solid var(--border);flex-wrap:wrap;font-size:11px">
          <div style="min-width:0;flex:1">
            <div style="font-weight:600" x-text="s.description || s.name"></div>
            <div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono)">
              <span x-text="s.name"></span> · <span x-text="s.state"></span> · <span x-text="s.driver"></span> · <span x-text="s.sample_spec"></span>
            </div>
          </div>
          <input type="range" min="0" max="100" step="1"
                 :value="s.volume_pct ?? 50"
                 @change="setSinkVolume(s, $event.target.value)"
                 style="flex:0 0 160px">
          <span style="font-family:var(--font-mono);min-width:36px;text-align:right" x-text="(s.volume_pct ?? '—') + '%'"></span>
          <button @click="toggleMute(s)" class="btn btn-ghost" style="font-size:10px">
            <span x-show="s.muted">unmute</span>
            <span x-show="!s.muted">mute</span>
          </button>
        </div>
      </template>
    </div>
    <div x-show="sinkAction" style="margin-top:var(--s-2);font-size:11px"
         :style="sinkActionOk ? 'color:var(--ok)' : 'color:var(--err)'"
         x-text="sinkAction"></div>
  </div>

  {# ---------- System sources (mics / line-in via pactl) ---------- #}
  <div class="card">
    <h3 style="margin:0 0 var(--s-2);font-size:13px">System audio sources (inputs)</h3>
    <template x-if="!sources || (sources.sources || []).length === 0">
      <div style="color:var(--text-dim);font-size:11px;font-style:italic">
        No inputs visible. <code>auto_null.monitor</code> and other loopbacks are filtered by default.
      </div>
    </template>
    <div style="display:flex;flex-direction:column;gap:var(--s-1)">
      <template x-for="s in (sources?.sources || [])" :key="s.index">
        <div style="display:flex;align-items:center;gap:var(--s-2);padding:var(--s-1) 0;border-bottom:1px solid var(--border);font-size:11px">
          <span class="dot" :class="s.state === 'RUNNING' ? 'ok' : 'dim'"></span>
          <span style="font-weight:600;min-width:140px" x-text="s.description || s.name"></span>
          <span style="font-family:var(--font-mono);color:var(--text-dim);font-size:10px" x-text="s.name + ' · ' + s.state"></span>
        </div>
      </template>
    </div>
  </div>

  {# ---------- Microphones (real) ---------- #}
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-2)">
      <h3 style="margin:0;font-size:13px">Microphones on the LAN</h3>
      <button @click="loadMics()" :disabled="micsLoading" class="btn btn-ghost" style="font-size:11px">
        <span x-show="!micsLoading">↻ Rescan</span>
        <span x-show="micsLoading">⏳ Scanning…</span>
      </button>
    </div>
    <p style="margin:0 0 var(--s-2);font-size:11px;color:var(--text-dim)">
      Passive mDNS discovery of <code>_ssc-https._tcp</code> services (Sennheiser TeamConnect family). Re-scan takes ~6s.
    </p>

    <template x-if="!mics || mics.length === 0">
      <div x-show="!micsLoading" style="color:var(--text-dim);font-size:11px;font-style:italic">
        No microphones discovered. Make sure the TCC is on the same LAN as studiopi and powered on.
      </div>
    </template>
    <template x-if="mics && mics.length === 1 && mics[0].error">
      <div style="color:var(--err);font-size:11px;font-family:var(--font-mono)" x-text="mics[0].error"></div>
    </template>

    <div style="display:flex;flex-direction:column;gap:var(--s-2)">
      <template x-for="m in (mics || []).filter(x => !x.error)" :key="m.id">
        <div style="display:flex;align-items:center;gap:var(--s-3);padding:var(--s-2);border:1px solid var(--border);flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:12px" x-text="m.friendly_name || m.hostname"></div>
            <div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono)">
              <span x-text="m.ip"></span>
              · <span x-text="m.hostname"></span>
              · <span x-text="m.vendor + ' ' + m.model"></span>
            </div>
          </div>
          <a :href="m.control_url" target="_blank" rel="noopener" class="btn btn-ghost" style="font-size:10px;text-decoration:none">↗ Admin UI</a>
          <button @click="muteMic(m, true)" class="btn btn-ghost" style="font-size:10px">Mute</button>
          <button @click="muteMic(m, false)" class="btn btn-ghost" style="font-size:10px">Unmute</button>
          <button @click="testMic(m)"
                  :disabled="m._testing"
                  class="btn btn-ghost" style="font-size:10px"
                  title="3× HTTPS reachability probe with latency. SSC2-over-WebSockets (real LED flash / mute control) is tracked as a follow-up.">
            <span x-show="!m._testing">▶ Test</span>
            <span x-show="m._testing">⏳</span>
          </button>
        </div>
      </template>
    </div>
    <div x-show="micsLastAction" style="margin-top:var(--s-2);font-size:11px"
         :style="micsLastOk ? 'color:var(--ok)' : 'color:var(--err)'"
         x-text="micsLastAction"></div>
  </div>

  {# ---------- Network audio streams (Dante / AES67 via SAP) ---------- #}
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-2)">
      <h3 style="margin:0;font-size:13px">Network audio streams (Dante / AES67)</h3>
      <button @click="loadStreams()" :disabled="streamsLoading" class="btn btn-ghost" style="font-size:11px">
        <span x-show="!streamsLoading">↻ Listen (5s)</span>
        <span x-show="streamsLoading">⏳ Listening…</span>
      </button>
    </div>
    <p style="margin:0 0 var(--s-2);font-size:11px;color:var(--text-dim)">
      Passive SAP listener on <code>239.255.255.255:9875</code>. One row per active multicast stream.
    </p>

    <template x-if="streams && streams.length === 1 && streams[0]._error">
      <div style="color:var(--err);font-size:11px;font-family:var(--font-mono)" x-text="streams[0]._error"></div>
    </template>
    <template x-if="streams && streams.length === 0 && !streamsLoading">
      <div style="font-size:11px;color:var(--text-dim);line-height:1.6">
        <div style="font-style:italic">No SAP announcements seen in the last listen window.</div>
        <div style="margin-top:6px">
          That's expected if the TCC isn't in <strong>AES67 mode</strong>. Dante devices only emit SAP when AES67 is explicitly enabled in <a href="https://my.audinate.com/products/dante-controller" target="_blank" rel="noopener">Dante Controller</a> (per-device toggle, plus an AES67-tagged multicast flow). The TCC's Dante control plane is reachable today (see Microphones above) — only the audio streams aren't announcing.
        </div>
      </div>
    </template>

    <div style="display:flex;flex-direction:column;gap:var(--s-2)">
      <template x-for="(s, idx) in (streams || []).filter(x => !x._error)" :key="idx">
        <div style="padding:var(--s-2);border:1px solid var(--border);font-size:11px">
          <div style="display:flex;align-items:center;gap:var(--s-2);flex-wrap:wrap">
            <span style="font-weight:600" x-text="s.name || '(unnamed stream)'"></span>
            <span class="pill" x-show="s.codec" x-text="s.codec + (s.sample_rate ? ' ' + s.sample_rate + 'Hz' : '')"></span>
            <span class="pill" x-show="s.channels" x-text="s.channels + ' ch'"></span>
            <span x-show="s.deletion" class="pill pill-err">deletion</span>
          </div>
          <div style="margin-top:4px;font-family:var(--font-mono);color:var(--text-dim);font-size:10px">
            from <span x-text="s.source_ip"></span>
            → <span x-text="s.multicast_group + ':' + s.port"></span>
            <span x-show="s.payload_type !== undefined">· pt=<span x-text="s.payload_type"></span></span>
            <span x-show="s.ptime_ms">· ptime=<span x-text="s.ptime_ms"></span>ms</span>
          </div>
          <details style="margin-top:4px">
            <summary style="font-size:10px;color:var(--text-dim);cursor:pointer">raw SDP</summary>
            <pre style="font-size:9px;background:var(--bg);padding:var(--s-1);overflow-x:auto;margin:4px 0 0" x-text="s.raw_sdp"></pre>
          </details>
        </div>
      </template>
    </div>
  </div>


</div>
