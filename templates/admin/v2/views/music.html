{# views/music.html — Spotify player view. music.js loads from
   index.html's <head>; no <script> tag here. #}

<div x-data="v2MusicView()" x-init="init()"
     style="display:flex;flex-direction:column;gap:var(--s-4)">

  {# ---------- Header ---------- #}
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s-3);flex-wrap:wrap">
    <div>
      <h1 style="margin:0">Music</h1>
      <p style="margin:var(--s-1) 0 0;color:var(--text-dim);font-size:12px">
        Spotify Web API · select a Connect device, play tracks, run speaker tests.
      </p>
    </div>
    <div style="display:flex;align-items:center;gap:var(--s-2)">
      <span class="pill" :class="configured ? 'pill-ok' : 'pill-err'"
            x-text="configured ? 'ready' : 'not configured'"></span>
      <button @click="runSpeakerTest()"
              :disabled="!configured || testRunning"
              class="btn btn-ghost"
              title="Play Hotel California on the Bose at 20% for 20s, then pause">
        <span x-show="!testRunning">▶ Run speaker test</span>
        <span x-show="testRunning">⏳ Running…</span>
      </button>
    </div>
  </div>

  {# ---------- Not configured: setup card ---------- #}
  <div x-show="!configured" class="card" style="border-color:var(--err)">
    <h3 style="margin:0 0 var(--s-2);color:var(--err)">Spotify not configured</h3>
    <p style="margin:0 0 var(--s-2);color:var(--text-mid);font-size:12px">
      The Music MCP is mounted and every endpoint works — they just return a "not configured" error until three env vars are on the Pi.
    </p>
    <ol style="margin:0;padding-left:18px;color:var(--text-mid);font-size:12px;line-height:1.7">
      <li>Create a Spotify Developer app at
          <a href="https://developer.spotify.com/dashboard" target="_blank" rel="noopener">developer.spotify.com/dashboard</a>.
          Add redirect URI <code>http://localhost:8888/callback</code>. Note the Client&nbsp;ID + Secret.</li>
      <li>On a dev machine with a browser:
          <pre style="background:var(--bg);padding:var(--s-2);font-size:10px;margin:var(--s-1) 0">pip install spotipy
export SPOTIFY_CLIENT_ID=…
export SPOTIFY_CLIENT_SECRET=…
python scripts/spotify_auth.py</pre>
          Browser opens; approve; the script prints a refresh token.</li>
      <li>Add the three values to <code>/home/admin/screen-mgr/.env</code> on the Pi
          (alongside <code>ANTHROPIC_API_KEY</code>).</li>
      <li>uvicorn reloads automatically. Refresh this page.</li>
    </ol>
    <div style="margin-top:var(--s-3);font-size:11px;color:var(--text-dim);font-family:var(--font-mono)"
         x-show="probeDetail"
         x-text="probeDetail"></div>
  </div>

  {# ---------- Now playing ---------- #}
  <div x-show="configured" class="card">
    <h3 style="margin:0 0 var(--s-3);font-size:13px">Now playing</h3>
    <template x-if="nowPlaying && nowPlaying.item">
      <div style="display:flex;gap:var(--s-3);align-items:center">
        <template x-if="nowPlaying.item.album?.images?.[0]?.url">
          <img :src="nowPlaying.item.album.images[0].url" alt=""
               style="width:64px;height:64px;border:1px solid var(--border)">
        </template>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
               x-text="nowPlaying.item.name"></div>
          <div style="font-size:11px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
               x-text="(nowPlaying.item.artists || []).map(a => a.name).join(', ')"></div>
          <div style="font-size:10px;color:var(--text-dim);margin-top:2px">
            on <span x-text="nowPlaying.device?.name || '—'"></span>
            · <span x-text="nowPlaying.is_playing ? 'playing' : 'paused'"></span>
          </div>
        </div>
      </div>
    </template>
    <template x-if="!nowPlaying || !nowPlaying.item">
      <div style="color:var(--text-dim);font-size:11px;font-style:italic">
        Nothing playing right now. Pick a device + use the search box below.
      </div>
    </template>

    {# Transport + volume #}
    <div style="margin-top:var(--s-3);padding-top:var(--s-2);border-top:1px solid var(--border);display:flex;align-items:center;gap:var(--s-2);flex-wrap:wrap">
      <button @click="previous()" class="btn btn-ghost" style="font-size:11px">⏮ Prev</button>
      <button @click="togglePlay()" class="btn btn-brand" style="font-size:11px">
        <span x-text="nowPlaying?.is_playing ? '⏸ Pause' : '▶ Play'"></span>
      </button>
      <button @click="next()" class="btn btn-ghost" style="font-size:11px">Next ⏭</button>
      <div style="flex:1;display:flex;align-items:center;gap:var(--s-1);min-width:140px">
        <span style="font-size:10px;color:var(--text-dim)">vol</span>
        <input type="range" min="0" max="100" step="1"
               :value="nowPlaying?.device?.volume_percent ?? 50"
               @change="setVolume($event.target.value)"
               style="flex:1">
        <span style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono);min-width:30px;text-align:right"
              x-text="(nowPlaying?.device?.volume_percent ?? 50) + '%'"></span>
      </div>
    </div>
    <div x-show="lastAction" style="font-size:11px;margin-top:var(--s-2)"
         :style="lastActionOk ? 'color:var(--ok)' : 'color:var(--err)'"
         x-text="lastAction"></div>
  </div>

  {# ---------- Devices ---------- #}
  <div x-show="configured" class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="margin:0;font-size:13px">Spotify Connect devices</h3>
      <button @click="loadAll()" class="btn btn-ghost" style="font-size:10px">↻</button>
    </div>
    <template x-if="devices.length === 0">
      <div style="color:var(--text-dim);font-size:11px;font-style:italic;margin-top:var(--s-2)">
        No devices visible. Open Spotify on the Bose (or any speaker on the studio's network) so it advertises as a Connect device.
      </div>
    </template>
    <div style="margin-top:var(--s-2);display:flex;flex-direction:column;gap:var(--s-1)">
      <template x-for="d in devices" :key="d.id">
        <div style="display:flex;align-items:center;gap:var(--s-2);padding:var(--s-1) 0;border-bottom:1px solid var(--border);font-size:12px">
          <span class="dot" :class="d.is_active ? 'ok' : 'dim'"></span>
          <span style="font-weight:600;min-width:140px" x-text="d.name"></span>
          <span class="pill" x-text="d.type"></span>
          <span x-show="d.volume_percent != null" style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono)"
                x-text="d.volume_percent + '%'"></span>
          <div style="flex:1"></div>
          <button @click="transferTo(d)" class="btn btn-ghost" style="font-size:10px;padding:2px 8px">
            <span x-show="d.is_active">active</span>
            <span x-show="!d.is_active">play here</span>
          </button>
        </div>
      </template>
    </div>
  </div>

  {# ---------- Search ---------- #}
  <div x-show="configured" class="card">
    <h3 style="margin:0 0 var(--s-2);font-size:13px">Search</h3>
    <div style="display:flex;gap:var(--s-2)">
      <input type="text" x-model="searchQuery"
             @keydown.enter="search()"
             placeholder="Track / artist / album"
             style="flex:1;font-size:12px">
      <button @click="search()" class="btn btn-brand" style="font-size:11px">Search</button>
    </div>
    <div style="margin-top:var(--s-2);display:flex;flex-direction:column;gap:var(--s-1)">
      <template x-for="t in searchResults" :key="t.uri">
        <div style="display:flex;align-items:center;gap:var(--s-2);padding:var(--s-1) 0;border-bottom:1px solid var(--border);font-size:12px">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="t.name"></div>
            <div style="font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                 x-text="(t.artists || []).map(a => a.name).join(', ')"></div>
          </div>
          <button @click="play(t.uri)" class="btn btn-ghost" style="font-size:10px;padding:2px 8px">▶ Play</button>
        </div>
      </template>
    </div>
  </div>

</div>
