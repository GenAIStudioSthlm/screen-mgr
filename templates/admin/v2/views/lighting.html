{# views/lighting.html — Hue controls. Per-zone block when a zone is selected
   (reads selected from the shell), plus global all-rooms / scenes /
   per-light controls. The lighting.js factory loads from index.html's
   <head>; no <script> tag here. #}

<div x-data="v2LightingView()" x-init="load()" style="display:flex;flex-direction:column;gap:var(--s-4)">

  {# ---------- Header / status ---------- #}
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s-3);flex-wrap:wrap">
    <div>
      <h1 style="margin:0">Lighting</h1>
      <p style="margin:var(--s-1) 0 0;color:var(--text-dim);font-size:12px">
        <span x-show="hue.paired && hue.available">Bridge <span style="font-family:var(--font-mono)" x-text="hue.bridge_ip"></span> &middot; reachable</span>
        <span x-show="hue.paired && !hue.available" style="color:var(--err)">Bridge <span style="font-family:var(--font-mono)" x-text="hue.bridge_ip"></span> &middot; not reachable</span>
        <span x-show="!hue.paired" style="color:var(--err)">Not paired</span>
      </p>
    </div>
    <div style="display:flex;gap:var(--s-2)">
      <button @click="runStartupTest()" :disabled="!hue.available || testRunning" class="btn btn-ghost" title="Rainbow walk + intensity sweep + settle (~12s)">
        <span x-show="!testRunning">▶ Run test</span>
        <span x-show="testRunning">⏳ Running…</span>
      </button>
      <button @click="allOn()"  :disabled="!hue.available" class="btn" style="background:var(--yellow);color:#000">☀ All on</button>
      <button @click="allOff()" :disabled="!hue.available" class="btn btn-ghost">☾ All off</button>
    </div>
  </div>

  {# ---------- Not paired ---------- #}
  <div x-show="!hue.paired" class="card" style="border-color:var(--err)">
    <h3 style="margin-bottom:var(--s-2);color:var(--err)">Pair the Hue Bridge first</h3>
    <ol style="font-size:12px;color:var(--text-mid);padding-left:18px;margin:0">
      <li>Find the physical Hue Bridge (small white square plugged into the router).</li>
      <li>Press the round button on top.</li>
      <li>Within 30 seconds, on studiopi:
        <pre style="background:#000;color:#0f0;padding:var(--s-2);font-size:10px;margin-top:var(--s-1)">ssh admin@studiopi.local
cd /home/admin/screen-mgr
python3 scripts/hue_pair.py</pre>
      </li>
      <li>Reload this page. The Lighting view populates.</li>
    </ol>
  </div>

  {# ---------- Zone-scoped block ---------- #}
  <template x-if="hue.available && selected && selected.light_group_id">
    <div class="card" style="border-color:var(--brand)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-2)">
        <h3 style="margin:0">
          Zone &mdash; <span x-text="selected.name"></span>
        </h3>
        <span class="pill" x-text="'group ' + selected.light_group_id"></span>
      </div>
      <template x-if="zoneGroup(selected)">
        <div style="display:flex;align-items:center;gap:var(--s-3);flex-wrap:wrap">
          <button @click="toggleZone(selected)" class="btn"
                  :style="(zoneGroup(selected).state?.any_on || zoneGroup(selected).action?.on) ? 'background:var(--yellow);color:#000' : 'background:var(--card);color:var(--text-mid);border:1px solid var(--border)'">
            <span x-text="(zoneGroup(selected).state?.any_on || zoneGroup(selected).action?.on) ? 'ON' : 'OFF'"></span>
          </button>
          <input type="range" min="0" max="254" step="1"
                 :value="zoneGroup(selected).action?.bri ?? 128"
                 @change="setZoneBri(selected, $event.target.value)"
                 style="flex:1;min-width:120px">
          <span style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">
            <span x-text="zoneGroup(selected).action?.bri ?? 0"></span>/254
          </span>
        </div>
      </template>
    </div>
  </template>

  {# ---------- All rooms ---------- #}
  <div x-show="hue.available && Object.keys(groups).length > 0" class="card">
    <h3 style="margin:0 0 var(--s-3) 0">Rooms</h3>
    <template x-for="[id, g] in rooms()" :key="id">
      <div style="display:flex;align-items:center;gap:var(--s-3);padding:var(--s-2) 0;border-bottom:1px solid var(--border);flex-wrap:wrap">
        <div style="min-width:120px;font-weight:600" x-text="g.name"></div>
        <input type="range" min="0" max="254" step="1"
               :value="g.action?.bri ?? 128"
               @change="setGroupBri(id, $event.target.value)"
               style="flex:1;min-width:120px">
        <button @click="toggleGroup(id, g)" class="btn"
                :style="(g.state?.any_on || g.action?.on) ? 'background:var(--yellow);color:#000' : 'background:var(--card);color:var(--text-mid);border:1px solid var(--border)'"
                style="min-width:60px">
          <span x-text="(g.state?.any_on || g.action?.on) ? 'ON' : 'OFF'"></span>
        </button>
      </div>
    </template>
  </div>

  {# ---------- Scenes ---------- #}
  <div x-show="hue.available && Object.keys(scenes).length > 0" class="card">
    <h3 style="margin:0 0 var(--s-3) 0">Scenes</h3>
    <div style="display:flex;flex-wrap:wrap;gap:var(--s-2)">
      <template x-for="[id, s] in Object.entries(scenes)" :key="id">
        <button @click="recallScene(id)" class="btn btn-ghost" style="font-size:11px" x-text="s.name"></button>
      </template>
    </div>
  </div>

  {# ---------- Individual lights ---------- #}
  <div x-show="hue.available && Object.keys(lights).length > 0" class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="margin:0">Individual lights</h3>
      <button @click="showLights = !showLights" class="btn btn-ghost" style="font-size:10px">
        <span x-text="showLights ? 'hide' : 'show ' + Object.keys(lights).length + ' lights'"></span>
      </button>
    </div>
    <div x-show="showLights" style="margin-top:var(--s-3);display:flex;flex-direction:column;gap:var(--s-1)">
      <template x-for="[id, l] in Object.entries(lights)" :key="id">
        <div style="display:flex;align-items:center;gap:var(--s-2);padding:var(--s-1) 0;border-bottom:1px solid var(--border);flex-wrap:wrap">
          <div style="min-width:160px">
            <span x-text="l.name"></span>
            <span x-show="!l.state?.reachable" style="font-size:10px;color:var(--err);margin-left:4px">unreachable</span>
          </div>
          <input type="range" min="1" max="254" step="1"
                 :value="l.state?.bri ?? 128"
                 @change="setLightBri(id, $event.target.value)"
                 :disabled="!l.state?.reachable"
                 style="flex:1;min-width:80px">
          <input type="color"
                 :value="hueToHexLight(l)"
                 @change="setLightColor(id, $event.target.value)"
                 :disabled="!l.state?.reachable || l.state?.hue == null"
                 style="width:32px;height:24px;border:1px solid var(--border);background:transparent;cursor:pointer">
          <button @click="toggleLight(id, l)" class="btn"
                  :style="l.state?.on ? 'background:var(--yellow);color:#000' : 'background:var(--card);color:var(--text-mid);border:1px solid var(--border)'"
                  :disabled="!l.state?.reachable"
                  style="min-width:50px;font-size:10px;padding:4px 8px">
            <span x-text="l.state?.on ? 'ON' : 'OFF'"></span>
          </button>
        </div>
      </template>
    </div>
  </div>

  <div x-show="lastAction" style="font-size:11px"
       :style="lastActionOk ? 'color:var(--ok)' : 'color:var(--err)'"
       x-text="lastAction"></div>

</div>
